<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fly or Die - Arcade Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fly or Die - Modern Arcade Game">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>
  
  <div id="game-container">
    <canvas id="game-canvas" width="480" height="720"></canvas>
    
    <div id="ui-overlay">
      <div id="main-menu" class="visible">
        <div class="menu-glow"></div>
        <h1 class="neon-title">
          <span class="glitch" data-text="FLY">FLY</span>
          <span class="or">or</span>
          <span class="glitch" data-text="DIE">DIE</span>
        </h1>
        <p class="subtitle">Arcade Challenge - Tap or click to fly!</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="start-btn">
            <span class="btn-content">Start Game</span>
            <span class="btn-shine"></span>
          </button>
          <button class="btn btn-secondary" id="show-lb-btn">
            <span class="btn-content">Leaderboard</span>
            <span class="btn-shine"></span>
          </button>
        </div>
        <p class="footer-text">v1.0 | © 2025 deepakrajjs</p>
      </div>
      
      <div id="level-complete">
        <div class="success-animation"></div>
        <h1 class="modal-title">Level Complete!</h1>
        <p id="next-level-info" class="modal-text"></p>
        <button class="btn btn-success" id="next-level-btn">
          <span class="btn-content">Next Level</span>
          <span class="btn-shine"></span>
        </button>
      </div>
      
      <div id="game-over">
        <div class="fail-animation"></div>
        <h1 class="modal-title game-over-title">Game Over</h1>
        <p id="final-score" class="modal-text"></p>
        <div class="btn-group">
          <button class="btn btn-primary" id="restart-btn">
            <span class="btn-content">Restart</span>
            <span class="btn-shine"></span>
          </button>
          <button class="btn btn-secondary" id="show-lb-btn-over">
            <span class="btn-content">Leaderboard</span>
            <span class="btn-shine"></span>
          </button>
        </div>
      </div>
      
      <div id="leaderboard">
        <h1 class="modal-title">Leaderboard</h1>
        <div class="lb-container">
          <ol id="lb-list"></ol>
        </div>
        <button class="btn btn-secondary" id="close-lb-btn">
          <span class="btn-content">Back</span>
          <span class="btn-shine"></span>
        </button>
      </div>
    </div>
    
    <div id="scoreboard" class="stat-box">
      <div class="stat-icon">⭐</div>
      <div class="stat-content">
        <div class="stat-label">Score</div>
        <div class="stat-value">0</div>
      </div>
    </div>
    
    <div id="level-indicator" class="stat-box">
      <div class="stat-icon">🎯</div>
      <div class="stat-content">
        <div class="stat-label">Level</div>
        <div class="stat-value">1</div>
      </div>
    </div>
    
    <button id="mute-btn" class="control-btn" title="Mute/Unmute Sound">
      <span class="sound-icon">🔊</span>
    </button>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
